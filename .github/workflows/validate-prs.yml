name: Validate PRs

on:
  pull_request:
    branches: [main]

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  schema-drift:
    name: Detect schema drift
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: drift_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Schema uses DATABASE_URL and DATABASE_URL_UNPOOLED
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/drift_check
      DATABASE_URL_UNPOOLED: postgresql://postgres:postgres@localhost:5432/drift_check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install
      - name: Check for schema drift
        run: |
          echo "Checking if schema.prisma matches migration history..."
          cd packages/database

          # Apply all migrations to the temporary database
          echo "Applying migrations to temporary database..."
          pnpm prisma migrate deploy

          # Generate a diff between the current database (after migrations) and the schema
          # If there's drift, this will output SQL that would be needed to sync
          echo "Comparing database state to schema.prisma..."
          DRIFT=$(pnpm prisma migrate diff \
            --from-schema-datasource prisma/schema.prisma \
            --to-schema-datamodel prisma/schema.prisma \
            --script 2>&1) || true

          # Filter out Prisma upgrade notifications (they appear as box-drawing characters)
          # Only keep lines that look like SQL or the empty migration message
          DRIFT_CLEAN=$(echo "$DRIFT" | grep -v "^┌\|^│\|^└\|Update available\|pris.ly\|npm i" || true)

          # Check if there's any drift (look for actual SQL statements beyond empty migration comment)
          # An empty migration only has "-- This is an empty migration."
          HAS_DRIFT=$(echo "$DRIFT_CLEAN" | grep -v "^--\|^$" | head -1 || true)

          if [ -n "$HAS_DRIFT" ]; then
            echo "::error::Schema drift detected! The schema.prisma file differs from the migration history."
            echo ""
            echo "This typically happens when 'prisma db push' was used instead of 'prisma migrate dev'."
            echo ""
            echo "To fix this, create a migration:"
            echo "  pnpm --filter @repo/database migrate dev --name <migration-name>"
            echo ""
            echo "Detected drift:"
            echo "$DRIFT_CLEAN"
            exit 1
          else
            echo "No schema drift detected. Schema matches migration history."
          fi

  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: "2.3.13"
      - name: Run Biome
        run: biome ci .
  e2e:
    name: Run e2e tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # Only run E2E tests on PRs from the same repo (not forks) since we need secrets
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      BETTER_AUTH_SECRET: ci-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install && pnpm --filter database generate
      - name: Install Playwright browsers
        run: pnpm --filter @repo/e2e exec playwright install chromium --with-deps
      - name: Wait for Neon preview branch and get credentials
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          echo "Waiting for Neon preview branch to be ready..."
          echo "Branch: ${{ github.head_ref }}"

          # Wait for Neon branch and get database credentials using ESM
          node --input-type=module -e "
            import { createNeonClientFromEnv } from './tooling/scripts/src/neon/api-client.mjs';
            import fs from 'fs';

            const gitBranch = '${{ github.head_ref }}';
            const client = createNeonClientFromEnv();

            // Wait up to 15 minutes for the branch to be ready
            const branch = await client.waitForBranch(gitBranch, {
              timeoutMs: 900000,  // 15 minutes
              initialDelay: 10000,
              maxDelay: 30000
            });

            const creds = await client.getBranchCredentials(branch);

            // Output for GitHub Actions
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'pooler_url=' + creds.poolerUrl + '\n');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'direct_url=' + creds.directUrl + '\n');
            console.log('Database credentials retrieved successfully');
          " || {
            echo "::warning::Neon preview not ready after 15 minutes, E2E tests will be skipped"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          }
      - name: Run Playwright tests
        if: steps.neon.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ steps.neon.outputs.pooler_url }}
          DATABASE_URL_UNPOOLED: ${{ steps.neon.outputs.direct_url }}
        run: pnpm --filter @repo/e2e e2e
      - name: Skip notice
        if: steps.neon.outputs.skip == 'true'
        run: echo "::notice::E2E tests skipped - Neon preview branch not ready"
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() && steps.neon.outputs.skip != 'true' }}
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 30
      - name: Upload Playwright Screenshots
        uses: actions/upload-artifact@v4
        if: ${{ failure() && steps.neon.outputs.skip != 'true' }}
        with:
          name: playwright-screenshots
          path: apps/e2e/test-results/**/screenshots/
          retention-days: 7
          if-no-files-found: ignore
      - name: Upload Playwright Videos
        uses: actions/upload-artifact@v4
        if: ${{ failure() && steps.neon.outputs.skip != 'true' }}
        with:
          name: playwright-videos
          path: apps/e2e/test-results/**/videos/
          retention-days: 7
          if-no-files-found: ignore
      - name: Upload Playwright Traces
        uses: actions/upload-artifact@v4
        if: ${{ failure() && steps.neon.outputs.skip != 'true' }}
        with:
          name: playwright-traces
          path: apps/e2e/test-results/**/trace.zip
          retention-days: 7
          if-no-files-found: ignore
  type-check:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install && pnpm --filter database generate
      - name: Build content-collections
        run: pnpm --filter web build
        env:
          SKIP_ENV_VALIDATION: "1"
      - name: Run type-check
        run: pnpm --filter web run type-check

  tests:
    name: Run workspace tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install && pnpm --filter database generate
      - name: Run unit tests
        env:
          TURBO_TELEMETRY_DISABLED: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: pnpm test:ci
